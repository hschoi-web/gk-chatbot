.msg.user{flex-direction:row-reverse}

.bot .bubble{background:#f0f0fa;color:#222;border-bottom-left-radius:4px}

.input:focus{border-color:#3E3ECC}
.send{background:#3E3ECC;color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:7px;height:7px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

function findAnswer(msg) {
  var q = msg.toLowerCase().replace(/\s/g, '');
  var best = null, score = 0;
  for (var i = 0; i < KB.length; i++) {
    var s = 0;
    for (var j = 0; j < KB[i].keys.length; j++) {
      if (q.indexOf(KB[i].keys[j]) >= 0) s++;
    }
    if (s > score) { score = s; best = KB[i]; }
  }
  if (best && score > 0) return best.answer;
  return '죄송합니다, 해당 정보를 찾지 못했어요.\n\n아래 주제로 질문해 주세요:\n- 근태체크 / 전자결재\n- 법인차량 / VPN\n- 카카오T비즈 / 휴가\n- 취업규칙 (수습, 정년, 징계, 해고, 퇴직금, 근로시간, 임금, 육아휴직, 복무규율, 괴롭힘, 재해보상 등)';
}

function addMsg(text, type) {
  var body = document.getElementById('chatBody');
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  if (type === 'bot') {
    div.innerHTML = '<div class="avatar">GK</div><div class="bubble">' + safe + '</div>';
  } else {
    div.innerHTML = '<div class="bubble">' + safe + '</div>';
  }
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  var body = document.getElementById('chatBody');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="avatar">GK</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMsg() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  showTyping();
  setTimeout(function() {
    removeTyping();
    addMsg(findAnswer(msg), 'bot');
  }, 600);
}

function sendQuick(msg) {
  document.getElementById('chatInput').value = msg;
  sendMsg();
}

  }, 300);
};
