<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>그라운드케이 업무지원 챗봇</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f4f6fb;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{width:100%;max-width:700px;height:100vh;max-height:820px;display:flex;flex-direction:column;background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.1);overflow:hidden}
.head{background:#3E3ECC;color:#fff;padding:18px 24px;font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.head .sub{font-size:12px;font-weight:400;opacity:.8;margin-top:2px}
.body{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.bubble{max-width:78%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;white-space:pre-wrap}
.bot .bubble{background:#f0f0fa;color:#222;border-bottom-left-radius:4px}
.user .bubble{background:#3E3ECC;color:#fff;border-bottom-right-radius:4px}
.avatar{width:34px;height:34px;border-radius:50%;background:#3E3ECC;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.btns{display:flex;flex-wrap:wrap;gap:8px;padding:4px 16px 12px}
.btn{background:#f0f0fa;color:#3E3ECC;border:1.5px solid #c5c5f0;border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn:hover{background:#3E3ECC;color:#fff;border-color:#3E3ECC}
.footer{display:flex;padding:12px 16px;gap:8px;border-top:1px solid #eee}
.input{flex:1;border:1.5px solid #ddd;border-radius:24px;padding:10px 18px;font-size:14px;outline:none}
.input:focus{border-color:#3E3ECC}
.send{background:#3E3ECC;color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:7px;height:7px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <span style="font-size:22px">🤖</span>
    <div>
      <div>그라운드케이 업무지원 챗봇</div>
      <div class="sub">근태 · 결재 · 법인차량 · VPN · 카카오T · 휴가 정책 안내</div>
    </div>
  </div>
  <div class="body" id="chatBody"></div>
  <div class="btns">
    <button class="btn" onclick="sendQuick('근태체크 방법')">📋 근태체크</button>
    <button class="btn" onclick="sendQuick('전자결재 방법')">📄 전자결재</button>
    <button class="btn" onclick="sendQuick('법인차량 예약')">🚗 법인차량</button>
    <button class="btn" onclick="sendQuick('VPN 설정')">🔐 VPN</button>
    <button class="btn" onclick="sendQuick('카카오T비즈')">🚕 카카오T</button>
    <button class="btn" onclick="sendQuick('연차 휴가')">🏖️ 휴가</button>
  </div>
  <div class="footer">
    <input class="input" id="chatInput" type="text" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter') sendMsg()"/>
    <button class="send" onclick="sendMsg()">➤</button>
  </div>
</div>
<script>
var KB = [
  {
    keys: ['근태체크','근무체크','출근','퇴근','근태기록','근태정정','기기등록','기기설정','외출','하이웍스'],
    answer: '📋 근태체크 관리\n\n기본 설정\n- 하이웍스 설치 후 [근무체크 기기등록] 필수\n- 계정당 1대의 PC만 설정 가능\n- 기기 변경 시 다음 날부터 적용\n- PC 교체 시 새 PC에서 전날 미리 등록\n\n근태 상태\n- 출근/퇴근: 일 1회씩 체크\n- 외출: 병원 진료, 공무, 10분 이상 자리 비움 시\n- 재택근무: 현재 사용 안 함\n\n기록 확인: 하이웍스 → [근무/경비처리]\n기록 정정: [근무체크 수정] 클릭 → 전자결재\n※ 정정 기안은 3일 이내 건만 가능'
  },
  {
    keys: ['전자결재','결재','기안','물품구매','송금','세금계산서','구매요청','결재선'],
    answer: '📄 전자결재 안내\n\n근태 관련\n- 근무체크 정정 기안\n- 휴일근무 신청 기안\n- 휴가 신청/취소 기안\n\n물품구매 요청\n하이웍스 → 전자결재 → 물품 구매 요청서\n- 결재선: 본인 → 김민정(정)/임혜린(부) → 부서장\n- 요청 기한: 최소 하루 전\n\n송금 요청\n하이웍스 → 전자결재 → 송금 요청서\n- 결재선: 본인 → 재무합의(김민정/임혜린) → 참조(장동원,이문선)\n- 제목: 회사명 / 집행내용 / 금액\n- 집행: 전일 결재완료 후 16시 이후\n\n세금계산서 발행 요청\n하이웍스 → 전자결재 → 세금계산서 발행 요청서\n- 결재선: 본인 → 김민정 → 참조(장동원,이문선,임혜린)'
  },
  {
    keys: ['법인차량','차량예약','차량반납','ev6','카니발','팰리세이드','운행일지','하이패스','자동세차'],
    answer: '🚗 법인차량 이용\n\n예약 가능 차량\n- EV6 (18허 0815)\n- 카니발 (191호 3405)\n- 팰리세이드 (142호 4479)\n- 팰리세이드 (142호 4483)\n\n예약: 하이웍스 → 예약 → 법인차량 → 차량 예약 → 키 수령\n반납: 노션 운행일지 작성 → 하이웍스 → 반납 처리 → 키 반납\n\n유의사항\n- 임직원만 이용 가능\n- 반납 시 주유 채우기 (공용:법인카드 / 개인:개인카드)\n- 개인 이용 시 하이패스 법인카드 제거\n- 실내청소 + 자동세차 후 반납\n- 운전자보험 미가입자는 직접 가입 필요'
  },
  {
    keys: ['vpn','재택근무','원격','l2tp','계정발급','서버주소','비밀키','인프라'],
    answer: '🔐 재택근무 VPN 설정\n\n1. 계정 발급\n@이영일 이사님께 요청 → ID, Password, 비밀키 수령\n\n2. Mac VPN 연결 방법\n① 시스템 환경설정 → 네트워크\n② [+] 버튼 → 새 네트워크 추가\n③ 인터페이스: VPN / 유형: L2TP\n④ 서버 주소: 123.142.188.36\n⑤ 계정 이름: 발급받은 ID\n⑥ 암호: 발급받은 PASSWORD\n⑦ 공유 보안: 발급받은 비밀키\n⑧ 연결 버튼 클릭\n\n※ macOS Sierra 이후 L2TP만 지원'
  },
  {
    keys: ['카카오t','카카오t비즈','카카오티','택시','대리','퀵','교통비','출장교통'],
    answer: '🚕 카카오T비즈 이용\n\n등록: 경영지원실에 요청 → 즉시 사용 가능\n비밀번호: 3540\n이용 수단: 택시, 기차, 대리, 퀵/배송\n\n호출 방법\n① 교통수단 선택: 업무용\n② 이용 사유 선택:\n   - 외근/출장 → 선택 후 바로 이용\n   - 행사 관련 → 행사명 필수 기입\n\n※ 미해결 여비교통비는 경영지원실 요청'
  },
  {
    keys: ['휴가','연차','월차','경조사','병가','대체휴무','공가','건강검진','예비군','결혼','사망','조부모','이월'],
    answer: '🏖️ 휴가 및 경조사 정책\n\n연차 현황 확인\n하이웍스 → [근무/경비처리] → [휴가현황]\n\n휴가 종류\n- 연차: 1년↑ 15일 / 3년차 16일 / 2년마다 1일↑ (최대 25일)\n- 월차: 1년 미만 / 1달 만근 시 1일 자동 생성\n- 대체휴무: 휴일 근무로 수동 생성\n- 병가/무급: 연차 차감 없음, 사전 회사 협의 필수\n- 공가: 건강검진 0.5일, 예비군(증빙 필수)\n\n경조사 휴가 (증빙 필수, 공휴일·주말 포함)\n- 결혼(본인): 5일\n- 사망(배우자, 자녀, 본인·배우자 부모): 5일\n- 사망(본인·배우자 조부모): 3일\n\n이월: 발생기간 + 1개월 이내 소진'
  }
];

function findAnswer(msg) {
  var q = msg.toLowerCase().replace(/\s/g, '');
  var best = null, score = 0;
  for (var i = 0; i < KB.length; i++) {
    var s = 0;
    for (var j = 0; j < KB[i].keys.length; j++) {
      if (q.indexOf(KB[i].keys[j]) >= 0) s++;
    }
    if (s > score) { score = s; best = KB[i]; }
  }
  if (best && score > 0) return best.answer;
  return '죄송합니다, 해당 정보를 찾지 못했어요.\n\n아래 주제로 질문해 주세요:\n- 근태체크 방법\n- 전자결재 방법\n- 법인차량 예약\n- VPN 설정\n- 카카오T비즈\n- 휴가 및 경조사 정책';
}

function addMsg(text, type) {
  var body = document.getElementById('chatBody');
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  if (type === 'bot') {
    div.innerHTML = '<div class="avatar">GK</div><div class="bubble">' + safe + '</div>';
  } else {
    div.innerHTML = '<div class="bubble">' + safe + '</div>';
  }
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  var body = document.getElementById('chatBody');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="avatar">GK</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMsg() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  showTyping();
  setTimeout(function() {
    removeTyping();
    addMsg(findAnswer(msg), 'bot');
  }, 600);
}

function sendQuick(msg) {
  document.getElementById('chatInput').value = msg;
  sendMsg();
}

window.onload = function() {
  setTimeout(function() {
    addMsg('안녕하세요! 그라운드케이 업무지원 챗봇입니다 😊\n아래 버튼을 누르거나 직접 질문해 주세요!', 'bot');
  }, 300);
};
</script>
</body>
</html>
